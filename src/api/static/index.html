<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Believable Minds — Intelligence Feed</title>
  <meta name="description" content="Track what the world's most influential minds are saying. Real-time position tracking, episode summaries, and shift detection." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Newsreader:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap" rel="stylesheet" />
  <style>
    /* ── Reset & Base ─────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 15px; scroll-behavior: smooth; }
    body {
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #050505; color: #e5e5e5;
      line-height: 1.6; min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    a { color: inherit; text-decoration: none; }

    /* ── Header / Nav ─────────────────────────────────────────────── */
    .site-header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(5,5,5,0.85); backdrop-filter: blur(16px);
      border-bottom: 1px solid #1a1a1a;
      padding: 0 24px; height: 56px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .site-logo { font-weight: 700; font-size: 17px; letter-spacing: -0.3px; color: #fff; }
    .site-nav { display: flex; gap: 0; height: 100%; }
    .nav-tab {
      padding: 0 20px; height: 56px; line-height: 56px;
      font-size: 13px; font-weight: 500; color: #555;
      border-bottom: 2px solid transparent;
      cursor: pointer; transition: color 0.2s, border-color 0.2s;
      user-select: none;
    }
    .nav-tab:hover { color: #999; }
    .nav-tab.active { color: #fff; border-bottom-color: #fff; }
    .header-actions { display: flex; gap: 10px; }
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 16px; border-radius: 8px;
      font-size: 12px; font-weight: 600; cursor: pointer;
      border: 1px solid #333; background: #111; color: #e5e5e5;
      transition: all 0.2s;
    }
    .btn:hover { background: #1a1a1a; border-color: #444; }
    .btn-primary { background: #fff; color: #050505; border-color: #fff; }
    .btn-primary:hover { background: #e5e5e5; }
    .btn-red { background: #dc2626; color: #fff; border-color: #dc2626; }
    .btn-red:hover { background: #b91c1c; }

    /* ── Main Container ───────────────────────────────────────────── */
    .main { max-width: 900px; margin: 0 auto; padding: 32px 24px 80px; }
    .page-header { margin-bottom: 28px; }
    .page-header h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; color: #fff; }
    .page-header p { font-size: 13px; color: #666; margin-top: 4px; }

    /* ── Cards ─────────────────────────────────────────────────────── */
    .card {
      background: #111; border: 1px solid #222;
      border-radius: 12px; padding: 20px;
      transition: border-color 0.2s;
    }
    .card:hover { border-color: #333; }

    /* ── Chips / Pills ────────────────────────────────────────────── */
    .chip-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
    .chip {
      padding: 6px 14px; border-radius: 20px;
      font-size: 12px; font-weight: 500; cursor: pointer;
      background: #111; border: 1px solid #222; color: #888;
      transition: all 0.2s; user-select: none;
    }
    .chip:hover { border-color: #444; color: #ccc; }
    .chip.active { background: #fff; color: #050505; border-color: #fff; }
    .tag-pill {
      display: inline-block; padding: 2px 8px; border-radius: 10px;
      font-size: 10px; font-weight: 500; background: #1a1a1a;
      color: #777; border: 1px solid #252525;
    }

    /* ── Avatar ────────────────────────────────────────────────────── */
    .avatar {
      display: inline-flex; align-items: center; justify-content: center;
      border-radius: 50%; font-weight: 700; font-size: 14px;
      color: #fff; flex-shrink: 0;
    }
    .avatar-sm { width: 36px; height: 36px; font-size: 12px; }
    .avatar-md { width: 48px; height: 48px; font-size: 16px; }
    .avatar-lg { width: 72px; height: 72px; font-size: 24px; }

    /* ── Verdict Badges ────────────────────────────────────────────── */
    .verdict {
      display: inline-block; padding: 3px 10px; border-radius: 6px;
      font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
      white-space: nowrap;
    }
    .verdict-essential { background: rgba(34,197,94,0.15); color: #22c55e; }
    .verdict-skim { background: rgba(245,158,11,0.15); color: #f59e0b; }
    .verdict-skip { background: rgba(100,100,100,0.15); color: #888; }
    .verdict-oneoff { background: rgba(168,85,247,0.15); color: #a855f7; }

    /* ── Feed list ─────────────────────────────────────────────────── */
    .feed-list { display: flex; flex-direction: column; gap: 2px; }
    .feed-item {
      display: flex; align-items: flex-start; justify-content: space-between;
      gap: 16px; padding: 18px 16px; border-radius: 10px;
      cursor: pointer; transition: background 0.15s;
    }
    .feed-item:hover { background: #111; }
    .feed-meta {
      font-size: 11px; color: #666; display: flex; align-items: center; gap: 8px;
      margin-bottom: 4px;
    }
    .feed-meta .channel-name { font-weight: 600; }
    .feed-meta .dot { color: #333; }
    .feed-title { font-size: 15px; font-weight: 600; color: #e5e5e5; line-height: 1.35; }
    .feed-tldr {
      font-size: 13px; color: #888; margin-top: 4px;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .feed-right { flex-shrink: 0; text-align: right; padding-top: 4px; }

    /* ── Verdict legend ────────────────────────────────────────────── */
    .verdict-legend {
      display: flex; gap: 16px; padding: 10px 16px; border-radius: 10px;
      background: #0a0a0a; margin-bottom: 20px; font-size: 11px; color: #555;
      flex-wrap: wrap; align-items: center;
    }
    .verdict-legend span { display: flex; align-items: center; gap: 5px; }

    /* ── Episode Detail ────────────────────────────────────────────── */
    .back-link {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 13px; color: #666; margin-bottom: 20px;
      cursor: pointer; transition: color 0.2s;
    }
    .back-link:hover { color: #fff; }
    .ep-meta { font-size: 12px; color: #666; margin-bottom: 8px; }
    .ep-title { font-family: 'Newsreader', serif; font-size: 28px; font-weight: 500; color: #fff; line-height: 1.3; margin-bottom: 16px; }
    .ep-verdict-row { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
    .ep-verdict-reason { font-size: 13px; color: #888; font-style: italic; }
    .depth-toggle { display: flex; gap: 0; margin-bottom: 24px; }
    .depth-btn {
      padding: 8px 18px; font-size: 12px; font-weight: 600;
      background: #111; border: 1px solid #222; color: #888;
      cursor: pointer; transition: all 0.2s;
    }
    .depth-btn:first-child { border-radius: 8px 0 0 8px; }
    .depth-btn:last-child { border-radius: 0 8px 8px 0; }
    .depth-btn.active { background: #fff; color: #050505; border-color: #fff; }
    .ep-body { font-family: 'Newsreader', serif; font-size: 17px; line-height: 1.75; color: #ccc; }
    .ep-body p { margin-bottom: 16px; }
    .section-list { display: flex; flex-direction: column; gap: 16px; }
    .section-item { display: flex; gap: 12px; align-items: flex-start; }
    .ts-badge {
      display: inline-block; padding: 3px 8px; border-radius: 6px;
      font-family: 'DM Sans', monospace; font-size: 11px; font-weight: 600;
      background: #1a1a1a; color: #888; cursor: pointer;
      transition: background 0.2s; white-space: nowrap; flex-shrink: 0;
    }
    .ts-badge:hover { background: #333; color: #fff; }
    .ts-badge-green { background: rgba(34,197,94,0.15); color: #22c55e; }
    .ts-badge-green:hover { background: rgba(34,197,94,0.3); }
    .section-title { font-weight: 600; font-size: 14px; color: #e5e5e5; }
    .section-summary { font-size: 13px; color: #888; margin-top: 2px; }
    .moments-list { display: flex; flex-direction: column; gap: 14px; margin-top: 24px; }
    .moment-item { display: flex; gap: 12px; align-items: flex-start; }
    .moment-desc { font-weight: 600; font-size: 13px; color: #e5e5e5; }
    .moment-quote { font-size: 12px; color: #777; font-style: italic; margin-top: 2px; }
    .shift-card {
      background: #1a1000; border: 1px solid #332800;
      border-radius: 12px; padding: 16px; margin-top: 24px;
    }
    .shift-card h3 { font-size: 14px; font-weight: 600; color: #f59e0b; margin-bottom: 8px; }
    .shift-card p { font-size: 13px; color: #cca800; }

    /* ── People List ────────────────────────────────────────────────── */
    .people-list { display: flex; flex-direction: column; gap: 2px; }
    .person-row {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 16px; border-radius: 10px;
      cursor: pointer; transition: background 0.15s;
    }
    .person-row:hover { background: #111; }
    .person-info { flex: 1; min-width: 0; }
    .person-name-row { display: flex; align-items: center; gap: 8px; }
    .person-name { font-size: 15px; font-weight: 600; color: #e5e5e5; }
    .shift-badge {
      display: inline-block; padding: 2px 8px; border-radius: 10px;
      font-size: 10px; font-weight: 600; background: rgba(245,158,11,0.15);
      color: #f59e0b;
    }
    .person-role { font-size: 12px; color: #666; margin-top: 2px; }
    .person-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 6px; }
    .person-stat { text-align: right; flex-shrink: 0; }
    .person-stat-num { font-size: 22px; font-weight: 700; color: #444; }
    .person-stat-label { font-size: 10px; color: #555; }

    /* ── Shifts Banner ─────────────────────────────────────────────── */
    .shifts-banner {
      background: #1a1000; border: 1px solid #332800;
      border-radius: 12px; padding: 16px 20px; margin-bottom: 24px;
    }
    .shifts-banner h2 { font-size: 14px; font-weight: 600; color: #f59e0b; margin-bottom: 12px; }
    .shift-list { display: flex; flex-direction: column; gap: 12px; }
    .shift-row {
      display: flex; align-items: center; gap: 10px;
      cursor: pointer; transition: opacity 0.2s;
    }
    .shift-row:hover { opacity: 0.8; }
    .shift-text { font-size: 13px; color: #cca800; flex: 1; }
    .shift-text strong { color: #e5c200; font-weight: 600; }

    /* ── Person Detail ─────────────────────────────────────────────── */
    .person-header { display: flex; gap: 20px; align-items: flex-start; margin-bottom: 20px; }
    .person-header-info { flex: 1; }
    .person-detail-name { font-family: 'Newsreader', serif; font-size: 28px; font-weight: 500; color: #fff; }
    .person-detail-role { font-size: 14px; color: #888; margin-top: 2px; }
    .person-detail-meta { font-size: 12px; color: #555; margin-top: 4px; }
    .person-bio {
      font-family: 'Newsreader', serif; font-size: 16px; line-height: 1.7;
      color: #bbb; border-left: 3px solid; padding-left: 16px;
      margin: 20px 0 28px;
    }
    .positions-section { margin-top: 28px; }
    .positions-section h2 { font-size: 16px; font-weight: 600; color: #fff; margin-bottom: 16px; }
    .position-item { padding: 14px 0; border-bottom: 1px solid #1a1a1a; }
    .position-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .sentiment-dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    }
    .sentiment-bullish { background: #22c55e; }
    .sentiment-bearish { background: #ef4444; }
    .sentiment-cautious, .sentiment-urgent { background: #f59e0b; }
    .sentiment-strong { background: #a855f7; }
    .sentiment-neutral { background: #888; }
    .position-topic { font-size: 14px; font-weight: 600; color: #e5e5e5; cursor: pointer; }
    .position-topic:hover { color: #fff; text-decoration: underline; }
    .position-date { font-size: 11px; color: #555; margin-left: auto; }
    .position-text { font-size: 13px; color: #999; line-height: 1.5; }
    .position-shift-note {
      background: #1a1000; border: 1px solid #332800;
      border-radius: 8px; padding: 10px 14px; margin-top: 8px;
      font-size: 12px; color: #cca800;
    }
    .appearances-section { margin-top: 32px; }
    .appearances-section h2 { font-size: 16px; font-weight: 600; color: #fff; margin-bottom: 16px; }
    .appearance-row {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 0; border-bottom: 1px solid #1a1a1a;
      cursor: pointer; transition: opacity 0.2s;
    }
    .appearance-row:hover { opacity: 0.8; }
    .appearance-info { flex: 1; }
    .appearance-title { font-size: 14px; font-weight: 500; color: #e5e5e5; }
    .appearance-meta { font-size: 11px; color: #666; margin-top: 2px; }

    /* ── Channels Grid ─────────────────────────────────────────────── */
    .channels-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }
    .channel-card {
      background: #111; border: 1px solid #222; border-radius: 12px;
      padding: 20px; border-left: 4px solid;
      cursor: pointer; transition: border-color 0.2s, transform 0.15s;
    }
    .channel-card:hover { border-color: #444; transform: translateY(-2px); }
    .channel-name { font-size: 16px; font-weight: 600; color: #fff; }
    .channel-handle { font-size: 12px; color: #555; margin-top: 2px; }
    .channel-count { font-size: 32px; font-weight: 700; margin: 14px 0 4px; }
    .channel-count-label { font-size: 11px; color: #666; }
    .channel-bottom { display: flex; align-items: center; justify-content: space-between; margin-top: 14px; }
    .channel-scanned { font-size: 11px; color: #555; }
    .channel-actions { display: flex; gap: 6px; }
    .btn-check {
      padding: 5px 12px; font-size: 11px; border-radius: 6px;
      background: #1a1a1a; border: 1px solid #333; color: #888;
      cursor: pointer; transition: all 0.2s;
    }
    .btn-check:hover { background: #333; color: #fff; }
    .btn-delete {
      padding: 5px 10px; font-size: 11px; border-radius: 6px;
      background: transparent; border: 1px solid #331111; color: #663333;
      cursor: pointer; transition: all 0.2s;
    }
    .btn-delete:hover { background: #1a0505; border-color: #552222; color: #ef4444; }

    /* ── Pipeline Status ───────────────────────────────────────────── */
    .pipeline-section {
      margin-top: 32px; padding: 24px;
      background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 14px;
    }
    .pipeline-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 20px;
    }
    .pipeline-header h2 { font-size: 16px; font-weight: 600; color: #e5e5e5; }
    .pipeline-refresh {
      padding: 4px 12px; font-size: 11px; border-radius: 6px;
      background: transparent; border: 1px solid #222; color: #555;
      cursor: pointer; transition: all 0.2s;
    }
    .pipeline-refresh:hover { border-color: #444; color: #aaa; }
    .pipeline-stats {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 12px;
    }
    .pipe-stat {
      background: #111; border: 1px solid #1a1a1a; border-radius: 10px;
      padding: 14px; text-align: center; transition: border-color 0.2s;
    }
    .pipe-stat:hover { border-color: #333; }
    .pipe-stat-num {
      font-size: 26px; font-weight: 700; line-height: 1;
    }
    .pipe-stat-label {
      font-size: 10px; color: #555; text-transform: uppercase;
      letter-spacing: 0.5px; margin-top: 6px;
    }
    .pipe-stat-num.clr-blue { color: #3b82f6; }
    .pipe-stat-num.clr-amber { color: #f59e0b; }
    .pipe-stat-num.clr-green { color: #22c55e; }
    .pipe-stat-num.clr-purple { color: #a855f7; }
    .pipe-stat-num.clr-red { color: #ef4444; }
    .pipe-stat-num.clr-gray { color: #555; }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%; display: inline-block;
      margin-right: 6px;
    }
    .status-dot.idle { background: #333; }
    .status-dot.active { background: #22c55e; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

    /* ── Modal ─────────────────────────────────────────────────────── */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
      display: none; align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #111; border: 1px solid #333; border-radius: 16px;
      padding: 28px; width: 90%; max-width: 480px;
      animation: modalSlide 0.2s ease-out;
    }
    @keyframes modalSlide { from { opacity: 0; transform: translateY(8px); } }
    .modal h2 { font-size: 18px; font-weight: 600; color: #fff; margin-bottom: 6px; }
    .modal p { font-size: 13px; color: #666; margin-bottom: 20px; }
    .modal-input {
      width: 100%; padding: 12px 14px; border-radius: 10px;
      background: #0a0a0a; border: 1px solid #333; color: #e5e5e5;
      font-size: 14px; font-family: inherit; outline: none;
      transition: border-color 0.2s;
    }
    .modal-input:focus { border-color: #555; }
    .modal-actions { display: flex; gap: 10px; margin-top: 16px; justify-content: flex-end; }
    .modal-error { color: #ef4444; font-size: 12px; margin-top: 8px; display: none; }

    /* ── Toast ─────────────────────────────────────────────────────── */
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: #22c55e; color: #050505; padding: 10px 24px;
      border-radius: 10px; font-size: 13px; font-weight: 600;
      z-index: 300; opacity: 0; transition: opacity 0.3s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; }

    /* ── Loading & Empty ───────────────────────────────────────────── */
    .loading { text-align: center; padding: 60px 20px; color: #444; font-size: 14px; }
    .empty { text-align: center; padding: 60px 20px; color: #444; }
    .empty h3 { font-size: 18px; color: #555; margin-bottom: 8px; }
    .empty p { font-size: 13px; }

    /* ── Responsive ────────────────────────────────────────────────── */
    @media (max-width: 640px) {
      .site-header { padding: 0 16px; }
      .nav-tab { padding: 0 12px; font-size: 12px; }
      .main { padding: 20px 16px 60px; }
      .page-header h1 { font-size: 22px; }
      .channels-grid { grid-template-columns: 1fr; }
      .ep-title { font-size: 22px; }
      .person-detail-name { font-size: 22px; }
      .btn span.hide-mobile { display: none; }
    }
  </style>
</head>
<body>

<!-- ── Header ──────────────────────────────────────────────────────── -->
<header class="site-header">
  <div class="site-logo">Believable Minds</div>
  <nav class="site-nav">
    <div class="nav-tab active" data-page="feed" onclick="navigate('feed')">Feed</div>
    <div class="nav-tab" data-page="people" onclick="navigate('people')">People</div>
    <div class="nav-tab" data-page="channels" onclick="navigate('channels')">Channels</div>
  </nav>
  <div class="header-actions">
    <button class="btn btn-primary" onclick="openModal('video')">+ <span class="hide-mobile">Add Video</span></button>
  </div>
</header>

<!-- ── Pages ───────────────────────────────────────────────────────── -->
<div id="app" class="main"></div>

<!-- ── Add Video Modal ─────────────────────────────────────────────── -->
<div id="modal-video" class="modal-overlay" onclick="if(event.target===this)closeModal('video')">
  <div class="modal">
    <h2>Add Video</h2>
    <p>Paste any YouTube video URL. It'll be transcribed and summarized — even if the channel isn't tracked.</p>
    <input id="input-video-url" class="modal-input" placeholder="https://youtube.com/watch?v=..." />
    <div id="error-video" class="modal-error"></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('video')">Cancel</button>
      <button class="btn btn-primary" id="btn-submit-video" onclick="submitVideo()">Add Video</button>
    </div>
  </div>
</div>

<!-- ── Add Channel Modal ───────────────────────────────────────────── -->
<div id="modal-channel" class="modal-overlay" onclick="if(event.target===this)closeModal('channel')">
  <div class="modal">
    <h2>Add Channel</h2>
    <p>Paste a YouTube channel URL or handle (e.g. @dwarkesh).</p>
    <input id="input-channel-url" class="modal-input" placeholder="@dwarkesh or https://youtube.com/@dwarkesh" />
    <div id="error-channel" class="modal-error"></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('channel')">Cancel</button>
      <button class="btn btn-primary" id="btn-submit-channel" onclick="submitChannel()">Add Channel</button>
    </div>
  </div>
</div>

<!-- ── Toast ───────────────────────────────────────────────────────── -->
<div id="toast" class="toast"></div>

<script>
/* ═════════════════════════════════════════════════════════════════════
   STATE
   ═════════════════════════════════════════════════════════════════════ */
const API = '/api';
let _feedData = [];
let _channelsData = [];
let _peopleData = [];
let _shiftsData = [];

/* ═════════════════════════════════════════════════════════════════════
   ROUTING
   ═════════════════════════════════════════════════════════════════════ */
function navigate(page, params = {}) {
  let hash = '#' + page;
  const qs = Object.entries(params).filter(([,v]) => v).map(([k,v]) => `${k}=${v}`).join('&');
  if (qs) hash += '?' + qs;
  location.hash = hash;
}

function parseHash() {
  const raw = location.hash.slice(1) || 'feed';
  const [path, qs] = raw.split('?');
  const params = {};
  if (qs) qs.split('&').forEach(p => {
    const [k, v] = p.split('=');
    params[k] = decodeURIComponent(v);
  });
  const parts = path.split('/');
  return { page: parts[0], id: parts[1], params };
}

window.addEventListener('hashchange', () => route());
function route() {
  const { page, id, params } = parseHash();
  // Update nav tabs
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.toggle('active', t.dataset.page === page || (page === 'episode' && t.dataset.page === 'feed') || (id && t.dataset.page === page)));
  if (page === 'feed' && !id) renderFeed(params.channel);
  else if (page === 'episode') renderEpisode(id);
  else if (page === 'people' && !id) renderPeople(params.tag);
  else if (page === 'people' && id) renderPersonDetail(id);
  else if (page === 'channels') renderChannels();
  else renderFeed();
}

/* ═════════════════════════════════════════════════════════════════════
   HELPERS

const $ = id => document.getElementById(id);
const app = () => $('app');
function api(path) { return fetch(API + path).then(r => r.json()); }
function apiPost(path, body) {
  return fetch(API + path, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) }).then(r => {
    if (!r.ok) return r.json().then(e => { throw new Error(e.detail || 'Request failed'); });
    return r.json();
  });
}
function apiDelete(path) {
  return fetch(API + path, { method: 'DELETE' }).then(r => {
    if (!r.ok) return r.json().then(e => { throw new Error(e.detail || 'Delete failed'); });
    return r.json();
  });
}

function timeAgo(iso) {
  if (!iso) return '';
  const diff = (Date.now() - new Date(iso)) / 1000;
  if (diff < 60) return 'just now';
  if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
  if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
  if (diff < 604800) return Math.floor(diff / 86400) + 'd ago';
  return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function formatDate(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function verdictClass(v) {
  if (!v) return 'verdict-skip';
  const l = v.toLowerCase();
  if (l.includes('essential') || l.includes('must')) return 'verdict-essential';
  if (l.includes('skim') || l.includes('worth')) return 'verdict-skim';
  return 'verdict-skip';
}

function verdictLabel(v) {
  if (!v) return 'NO VERDICT';
  const l = v.toLowerCase();
  if (l.includes('essential') || l.includes('must')) return '● ESSENTIAL';
  if (l.includes('skim') || l.includes('worth')) return '◐ WORTH SKIMMING';
  return '○ SKIP UNLESS FAN';
}

function avatarHTML(initials, color, size = 'sm') {
  return `<div class="avatar avatar-${size}" style="background:${color || '#666'};">${initials || '??'}</div>`;
}

function sentimentClass(s) {
  if (!s) return 'sentiment-neutral';
  const l = s.toLowerCase();
  if (l === 'bullish') return 'sentiment-bullish';
  if (l === 'bearish') return 'sentiment-bearish';
  if (l === 'cautious' || l === 'urgent') return 'sentiment-cautious';
  if (l === 'strong') return 'sentiment-strong';
  return 'sentiment-neutral';
}

function showToast(msg) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

/* Rotating accent colors for channels without stored color */
const CHANNEL_COLORS = ['#6366f1','#8b5cf6','#ec4899','#f43f5e','#f97316','#eab308','#22c55e','#14b8a6','#0ea5e9','#3b82f6'];
function channelColor(name, idx) {
  return CHANNEL_COLORS[idx % CHANNEL_COLORS.length];
}

   ═════════════════════════════════════════════════════════════════════ */
function openModal(type) {
  $(`modal-${type}`).classList.add('open');
  $(`input-${type}-url`).focus();
}
function closeModal(type) {
  $(`modal-${type}`).classList.remove('open');
  $(`input-${type}-url`).value = '';
  $(`error-${type}`).style.display = 'none';
}
async function submitVideo() {
  const url = $('input-video-url').value.trim();
  if (!url) return;
  const btn = $('btn-submit-video');
  btn.textContent = 'Adding...'; btn.disabled = true;
  try {
    const res = await apiPost('/videos/add', { youtube_url: url });
    closeModal('video');
    showToast(res.status === 'already_exists' ? 'Video already tracked' : `Video queued: ${res.title || res.youtube_video_id}`);
  } catch (e) {
    $('error-video').textContent = e.message;
    $('error-video').style.display = 'block';
  }
  btn.textContent = 'Add Video'; btn.disabled = false;
}
async function submitChannel() {
  const url = $('input-channel-url').value.trim();
  if (!url) return;
  const btn = $('btn-submit-channel');
  btn.textContent = 'Adding...'; btn.disabled = true;
  try {
    await apiPost('/channels', { url_or_handle: url });
    closeModal('channel');
    showToast('Channel added!');
    if (parseHash().page === 'channels') renderChannels();
  } catch (e) {
    $('error-channel').textContent = e.message;
    $('error-channel').style.display = 'block';
  }
  btn.textContent = 'Add Channel'; btn.disabled = false;
}

async function renderFeed(channelFilter) {

  try {
    const [feed, channels] = await Promise.all([
      api('/summaries/feed?limit=40' + (channelFilter ? `&channel_id=${channelFilter}` : '')),
      _channelsData.length ? _channelsData : api('/channels'),
    ]);
    _feedData = feed;
    _channelsData = channels;
  } catch (e) {
    app().innerHTML = '<div class="empty"><h3>Could not load feed</h3></div>';
    return;
  }

  let html = `
    <div class="page-header">
      <h1>Feed</h1>
      <p>Episode summaries from your tracked channels</p>
    </div>
    <div class="chip-row">
      <div class="chip ${!channelFilter ? 'active' : ''}" onclick="navigate('feed')">All</div>
      ${_channelsData.map(ch =>
        `<div class="chip ${channelFilter === ch.id ? 'active' : ''}" onclick="navigate('feed',{channel:'${ch.id}'})">${ch.name}</div>`
      ).join('')}
    </div>
    <div class="verdict-legend">
      <span><span class="verdict verdict-essential" style="font-size:9px;">●</span> Essential — must watch</span>
      <span><span class="verdict verdict-skim" style="font-size:9px;">◐</span> Worth skimming</span>
      <span><span class="verdict verdict-skip" style="font-size:9px;">○</span> Skip unless fan</span>
    </div>
  `;

  if (!_feedData.length) {
    html += '<div class="empty"><h3>No episodes yet</h3><p>Add channels or videos to get started.</p></div>';
  } else {
    html += '<div class="feed-list">';
    for (const ep of _feedData) {
      const isOneOff = ep.discovery_method === 'manual' && !ep.channel_id;
      html += `
        <div class="feed-item" onclick="navigate('episode/${ep.video_id}')">
          <div style="flex:1;min-width:0;">
            <div class="feed-meta">
              <span class="channel-name" style="color:${_channelsData.find(c => c.id === ep.channel_id)?.name ? channelColor(ep.channel_name, _channelsData.findIndex(c => c.id === ep.channel_id)) : '#888'}">${ep.channel_name || 'One-off'}</span>
              <span class="dot">·</span>
              <span>${timeAgo(ep.published_at)}</span>

            </div>
            <div class="feed-title">${ep.video_title || 'Untitled'}</div>
            <div class="feed-tldr">${ep.tldr || ''}</div>
          </div>
          <div class="feed-right">
            ${isOneOff ? '<span class="verdict verdict-oneoff">ONE-OFF</span>' : `<span class="verdict ${verdictClass(ep.watch_verdict)}">${verdictLabel(ep.watch_verdict)}</span>`}
          </div>
        </div>
      `;
    }
    html += '</div>';
  }

  app().innerHTML = html;
}

/* ═════════════════════════════════════════════════════════════════════
   EPISODE DETAIL
   ═════════════════════════════════════════════════════════════════════ */
async function renderEpisode(videoId) {
  // Find in cached feed data or fetch
  let ep = _feedData.find(e => e.video_id === videoId);
  if (!ep) {
    app().innerHTML = '<div class="loading">Loading episode...</div>';
    try {
      const feed = await api(`/summaries/feed?limit=100`);
      ep = feed.find(e => e.video_id === videoId);
      if (!ep) { app().innerHTML = '<div class="empty"><h3>Episode not found</h3></div>'; return; }
    } catch { app().innerHTML = '<div class="empty"><h3>Could not load episode</h3></div>'; return; }
  }

  const ytUrl = ep.youtube_video_id ? `https://youtube.com/watch?v=${ep.youtube_video_id}` : null;
  const detailed = ep.detailed || {};
  const sections = detailed.sections || [];
  const moments = detailed.best_moments || [];
  const hasShift = ep.whats_new && !ep.whats_new.toLowerCase().includes('consistent');

  let html = `
    <div class="back-link" onclick="navigate('feed')">← Back to feed</div>
    <div class="ep-meta">${ep.channel_name || 'One-off'} · ${formatDate(ep.published_at)}${ep.duration_display ? ' · ' + ep.duration_display : ''}</div>
    <div class="ep-title">${ep.video_title || 'Untitled'}</div>
    <div class="ep-verdict-row">
      <span class="verdict ${verdictClass(ep.watch_verdict)}">${verdictLabel(ep.watch_verdict)}</span>
      ${ep.watch_verdict_reason ? `<span class="ep-verdict-reason">${ep.watch_verdict_reason}</span>` : ''}
    </div>
    ${ytUrl ? `<a href="${ytUrl}" target="_blank" class="btn btn-red" style="margin-bottom:24px;">▶ Watch on YouTube</a>` : ''}
    <div class="depth-toggle">
      <button class="depth-btn active" onclick="setDepth('tldr', this)">30-Sec TL;DR</button>
      <button class="depth-btn" onclick="setDepth('summary', this)">2-Min Read</button>
      <button class="depth-btn" onclick="setDepth('full', this)">Full Breakdown</button>
    </div>
    <div id="ep-content"></div>
  `;

  if (moments.length) {
    html += `
      <h3 style="font-size:16px;font-weight:600;color:#fff;margin-top:32px;">Best Moments</h3>
      <div class="moments-list">
        ${moments.map(m => {
          const ts = m.timestamp || m.start_time;
          const tsSeconds = typeof ts === 'number' ? ts : 0;
          const tsDisplay = tsSeconds ? `${Math.floor(tsSeconds/60)}:${String(tsSeconds%60).padStart(2,'0')}` : '';
          const tsLink = ep.youtube_video_id ? `https://youtube.com/watch?v=${ep.youtube_video_id}&t=${tsSeconds}s` : '#';
          return `
            <div class="moment-item">
              <a href="${tsLink}" target="_blank" class="ts-badge ts-badge-green">${tsDisplay || '—'}</a>
              <div>
                <div class="moment-desc">${m.description || m.title || ''}</div>
                ${m.quote ? `<div class="moment-quote">"${m.quote}"</div>` : ''}
              </div>
            </div>
          `;
        }).join('')}
      </div>
    `;
  }

  if (hasShift) {
    html += `
      <div class="shift-card">
        <h3>⚡ Position Shift Detected</h3>
        <p>${ep.whats_new}</p>
      </div>
    `;
  }

  app().innerHTML = html;

  // Store for depth toggle
  window._epData = { tldr: ep.tldr, summary: ep.summary_body, sections, ytId: ep.youtube_video_id };
  setDepth('tldr');
}

function setDepth(depth, btn) {
  document.querySelectorAll('.depth-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  else document.querySelector(`.depth-btn[onclick*="${depth}"]`)?.classList.add('active');
  const el = $('ep-content');
  const d = window._epData;
  if (!d) return;

  if (depth === 'tldr') {
    el.innerHTML = `<div class="ep-body"><p>${d.tldr || 'No TL;DR available.'}</p></div>`;
  } else if (depth === 'summary') {
    const paragraphs = (d.summary || 'No summary available.').split('\n').filter(Boolean).map(p => `<p>${p}</p>`).join('');
    el.innerHTML = `<div class="ep-body">${paragraphs}</div>`;
  } else {
    if (!d.sections.length) {
      el.innerHTML = '<div class="empty"><p>No detailed breakdown available.</p></div>';
      return;
    }
    el.innerHTML = `<div class="section-list">${d.sections.map(s => {
      const ts = s.timestamp || s.start_time;
      const tsSeconds = typeof ts === 'number' ? ts : 0;
      const tsDisplay = tsSeconds ? `${Math.floor(tsSeconds/60)}:${String(tsSeconds%60).padStart(2,'0')}` : '';
      const tsLink = d.ytId ? `https://youtube.com/watch?v=${d.ytId}&t=${tsSeconds}s` : '#';
      return `
        <div class="section-item">
          <a href="${tsLink}" target="_blank" class="ts-badge">${tsDisplay || '—'}</a>
          <div>
            <div class="section-title">${s.title || ''}</div>
            <div class="section-summary">${s.summary || ''}</div>
          </div>
        </div>
      `;
    }).join('')}</div>`;
  }
}

/* ═════════════════════════════════════════════════════════════════════
   PEOPLE PAGE
   ═════════════════════════════════════════════════════════════════════ */
async function renderPeople(tagFilter) {
  app().innerHTML = '<div class="loading">Loading people...</div>';

  try {
    const [people, shifts] = await Promise.all([
      api('/people'),
      api('/positions/shifts?limit=10'),
    ]);
    _peopleData = people;
    _shiftsData = shifts;
  } catch {
    app().innerHTML = '<div class="empty"><h3>Could not load people</h3></div>';
    return;
  }

  // Collect tags
  const allTags = new Set();
  _peopleData.forEach(p => (p.expertise_domains || []).forEach(d => allTags.add(d)));
  const sortedTags = [...allTags].sort();

  // Filter
  let filtered = _peopleData;
  if (tagFilter) {
    filtered = _peopleData.filter(p => (p.expertise_domains || []).includes(tagFilter));
  }

  // Build shift counts per person
  const shiftCounts = {};
  _shiftsData.forEach(s => { shiftCounts[s.person_id] = (shiftCounts[s.person_id] || 0) + 1; });

  let html = `
    <div class="page-header">
      <h1>People</h1>
      <p>Tracked minds and their current positions</p>
    </div>
    <div class="chip-row">
      <div class="chip ${!tagFilter ? 'active' : ''}" onclick="navigate('people')">All</div>
      ${sortedTags.map(t =>
        `<div class="chip ${tagFilter === t ? 'active' : ''}" onclick="navigate('people',{tag:'${t}'})">${t.replace(/_/g,' ')}</div>`
      ).join('')}
    </div>
  `;

  // Shifts banner
  if (_shiftsData.length && !tagFilter) {
    html += `
      <div class="shifts-banner">
        <h2>⚡ Recent Position Shifts</h2>
        <div class="shift-list">
          ${_shiftsData.slice(0, 5).map(s => `
            <div class="shift-row" onclick="navigate('people/${s.person_id}')">
              ${avatarHTML(s.person_photo_initials, s.person_accent_color, 'sm')}
              <div class="shift-text"><strong>${s.person_name}</strong> on ${s.topic_name}: ${s.shift_note || s.position_summary?.slice(0,100) || ''}</div>
            </div>
          `).join('')}
        </div>
      </div>
    `;
  }

  html += '<div class="people-list">';
  for (const p of filtered) {
    const sc = shiftCounts[p.id] || 0;
    const tags = (p.expertise_domains || []).slice(0, 4).map(t => `<span class="tag-pill">${t.replace(/_/g,' ')}</span>`).join('');
    const roleNet = [p.role_title, p.net_worth].filter(Boolean).join(' · ');
    html += `
      <div class="person-row" onclick="navigate('people/${p.id}')">
        ${avatarHTML(p.photo_initials, p.accent_color, 'md')}
        <div class="person-info">
          <div class="person-name-row">
            <span class="person-name">${p.name}</span>
            ${sc ? `<span class="shift-badge">⚡ ${sc} shift${sc > 1 ? 's' : ''}</span>` : ''}
          </div>
          ${roleNet ? `<div class="person-role">${roleNet}</div>` : ''}
          <div class="person-tags">${tags}</div>
        </div>
        <div class="person-stat">
          <div class="person-stat-num">${p.claim_count || 0}</div>
          <div class="person-stat-label">positions</div>
        </div>
      </div>
    `;
  }
  html += '</div>';
  app().innerHTML = html;
}

/* ═════════════════════════════════════════════════════════════════════
   PERSON DETAIL
   ═════════════════════════════════════════════════════════════════════ */
async function renderPersonDetail(personId) {
  app().innerHTML = '<div class="loading">Loading person...</div>';

  let person;
  try {
    person = await api(`/people/${personId}`);
  } catch {
    app().innerHTML = '<div class="empty"><h3>Person not found</h3></div>';
    return;
  }

  const bioText = person.bio || person.inclusion_notes || '';
  const metaParts = [person.age ? `Age ${person.age}` : null, person.net_worth].filter(Boolean);
  const tags = (person.expertise_domains || []).map(t =>
    `<span class="tag-pill" style="cursor:pointer;" onclick="event.stopPropagation();navigate('people',{tag:'${t}'})">${t.replace(/_/g,' ')}</span>`
  ).join(' ');

  // Build shift lookup per topic
  const shiftByTopic = {};
  (person.shifts || []).forEach(s => { if (s.topic_slug) shiftByTopic[s.topic_slug] = s; });

  let html = `
    <div class="back-link" onclick="navigate('people')">← Back to people</div>
    <div class="person-header">
      ${avatarHTML(person.photo_initials, person.accent_color, 'lg')}
      <div class="person-header-info">
        <div class="person-detail-name">${person.name}</div>
        ${person.role_title ? `<div class="person-detail-role">${person.role_title}</div>` : ''}
        ${metaParts.length ? `<div class="person-detail-meta">${metaParts.join(' · ')}</div>` : ''}
      </div>
    </div>
    <div style="margin-bottom:16px;">${tags}</div>
    ${bioText ? `<div class="person-bio" style="border-color:${person.accent_color || '#666'};">${bioText}</div>` : ''}
  `;

  // Positions
  if (person.positions && person.positions.length) {
    html += `<div class="positions-section"><h2>Current Positions</h2>`;
    for (const pos of person.positions) {
      const hasShift = shiftByTopic[pos.topic];
      html += `
        <div class="position-item">
          <div class="position-header">
            <div class="sentiment-dot ${sentimentClass(pos.sentiment)}"></div>
            <span class="position-topic" onclick="navigate('people',{tag:'${pos.topic || ''}'})"> ${pos.topic_name || pos.topic || ''}</span>
            ${hasShift ? '<span class="shift-badge">⚡ SHIFTED</span>' : ''}
            <span class="position-date">${timeAgo(pos.last_updated)}</span>
          </div>
          <div class="position-text">${pos.current_position || ''}</div>
          ${hasShift ? `<div class="position-shift-note">⚡ ${hasShift.shift_note || hasShift.position_summary || ''}</div>` : ''}
        </div>
      `;
    }
    html += '</div>';
  }

  // Appearances
  if (person.appearances && person.appearances.length) {
    html += `<div class="appearances-section"><h2>Recent Appearances</h2>`;
    for (const a of person.appearances) {
      html += `
        <div class="appearance-row" onclick="navigate('episode/${a.video_id}')">
          <div class="appearance-info">
            <div class="appearance-title">${a.video_title || 'Untitled'}</div>
            <div class="appearance-meta">${a.channel_name || ''} · ${formatDate(a.published_at)}</div>
          </div>
          ${a.watch_verdict ? `<span class="verdict ${verdictClass(a.watch_verdict)}" style="flex-shrink:0;">${verdictLabel(a.watch_verdict)}</span>` : ''}
        </div>
      `;
    }
    html += '</div>';
  }

  app().innerHTML = html;
}

async function refreshPipelineStatus() {
  try {
    const s = await api('/pipeline/status');
    const v = s.videos || {};
    const c = s.claims || {};
    const isActive = (v.discovered || 0) > 0 || (v.transcribed || 0) > 0 || (v.identified || 0) > 0;
    const dot = document.getElementById('pipeline-dot');
    if (dot) dot.className = `status-dot ${isActive ? 'active' : 'idle'}`;
    const el = document.getElementById('pipeline-stats');
    if (!el) return;
    el.innerHTML = `
      <div class="pipe-stat"><div class="pipe-stat-num clr-blue">${v.total || 0}</div><div class="pipe-stat-label">Total Videos</div></div>
      <div class="pipe-stat"><div class="pipe-stat-num clr-amber">${v.discovered || 0}</div><div class="pipe-stat-label">Discovered</div></div>
      <div class="pipe-stat"><div class="pipe-stat-num clr-purple">${v.transcribed || 0}</div><div class="pipe-stat-label">Transcribed</div></div>
      <div class="pipe-stat"><div class="pipe-stat-num clr-green">${v.enriched || 0}</div><div class="pipe-stat-label">Enriched</div></div>
      <div class="pipe-stat"><div class="pipe-stat-num clr-green">${c.approved || 0}</div><div class="pipe-stat-label">Claims Approved</div></div>
      <div class="pipe-stat"><div class="pipe-stat-num clr-red">${c.pending || 0}</div><div class="pipe-stat-label">Claims Pending</div></div>
      <div class="pipe-stat"><div class="pipe-stat-num clr-gray">${s.positions || 0}</div><div class="pipe-stat-label">Positions</div></div>
      <div class="pipe-stat"><div class="pipe-stat-num clr-gray">${s.people || 0}</div><div class="pipe-stat-label">People</div></div>
    `;
  } catch {
    const el = document.getElementById('pipeline-stats');
    if (el) el.innerHTML = '<div class="pipe-stat"><div class="pipe-stat-num clr-red">!</div><div class="pipe-stat-label">Could not load</div></div>';
  }
}

async function scanChannel(id, btn) {
  btn.textContent = '⏳ Checking...'; btn.disabled = true;
  try {
    const res = await apiPost(`/channels/${id}/scan`, {});
    btn.textContent = `✓ ${res.new_videos || 0} new`;
    setTimeout(() => renderChannels(), 2000);
  } catch (e) {
    btn.textContent = '✗ Failed';
    setTimeout(() => { btn.textContent = '↻ Check Now'; btn.disabled = false; }, 2000);
  }
}

async function deleteChannel(id, name) {
  if (!confirm(`Remove "${name}" from tracked channels? Videos already processed will be kept.`)) return;
  try {
    await apiDelete(`/channels/${id}`);
    showToast(`Removed ${name}`);
    renderChannels();
  } catch (e) {
    showToast('Failed to remove channel');
  }
}
