services:
  db:
    image: pgvector/pgvector:pg16
    container_name: believable-minds-db
    environment:
      POSTGRES_USER: bm
      POSTGRES_PASSWORD: bm_dev_password
      POSTGRES_DB: believable_minds
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bm -d believable_minds"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
